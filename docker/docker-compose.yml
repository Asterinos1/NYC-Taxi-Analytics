version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    image: apache/spark:3.5.6
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    volumes:
      - ../data:/data
      - ../spark-app:/spark-app
      - ../data/spark-events:/data/spark-events

  spark-worker:
    image: apache/spark:3.5.6
    container_name: spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
    volumes:
      - ../data:/data
      - ../spark-app:/spark-app
      - ../data/spark-events:/data/spark-events
    depends_on:
      - spark-master

  spark-history-server:
    image: apache/spark:3.5.6
    container_name: spark-history-server
    user: root
    command: /opt/spark/sbin/start-history-server.sh
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:///data/spark-events
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ../data/spark-events:/data/spark-events
    depends_on:
      - spark-master

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-init
    user: root
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin && \
        airflow connections add fs_default \
          --conn-type fs \
          --conn-extra '{"path": "/"}' || true
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=True
      - AIRFLOW__API_AUTH__JWT_SECRET=some-static-32-char-secure-secret-key-1234
      - PYTHONPATH=/home/airflow/.local/lib/python3.13/site-packages
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-scheduler
    user: root
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=True
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_CONN_FS_DEFAULT=fs://
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=some-static-32-char-secure-secret-key-1234
      - AIRFLOW__FAB__AUTH_ROLE_PUBLIC=Admin
      - PYTHONPATH=/home/airflow/.local/lib/python3.13/site-packages
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/logs:/opt/airflow/logs
      - ../data:/data
      - ../spark-app:/spark-app
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-webserver
    user: root
    command: api-server
    restart: always
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=True
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_CONN_FS_DEFAULT=fs://
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=some-static-32-char-secure-secret-key-1234
      - AIRFLOW__WEBSERVER__WEBSERVER_CONFIG=/opt/airflow/config/webserver_config.py
      - AIRFLOW__FAB__AUTH_ROLE_PUBLIC=Admin
      - PYTHONPATH=/home/airflow/.local/lib/python3.13/site-packages
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/logs:/opt/airflow/logs
      - ../data:/data
      - ../spark-app:/spark-app
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow-dag-processor
    user: root
    command: dag-processor
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=True
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - AIRFLOW_CONN_FS_DEFAULT=fs://
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API_AUTH__JWT_SECRET=some-static-32-char-secure-secret-key-1234
      - AIRFLOW__FAB__AUTH_ROLE_PUBLIC=Admin
      - PYTHONPATH=/home/airflow/.local/lib/python3.13/site-packages
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/config:/opt/airflow/config
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/logs:/opt/airflow/logs
      - ../data:/data
      - ../spark-app:/spark-app
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
